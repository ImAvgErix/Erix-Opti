name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ErixOpti.sln

      - name: Build
        run: dotnet build ErixOpti.sln -c Release --no-restore

      - name: Publish single-file
        run: >
          dotnet publish ErixOpti/ErixOpti.csproj -c Release -r win-x64 --no-restore
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:WindowsAppSDKSelfContained=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/singlefile

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $exe = Get-ChildItem -Recurse -Filter "ErixOpti.exe" "publish/singlefile" | Select-Object -First 1
          if ($exe) { Copy-Item -Force $exe.FullName "artifacts/ErixOpti.exe" }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erixopti-build
          path: artifacts/**/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ErixOpti ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
